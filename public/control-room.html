<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertifex — Operations Control Centre</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body {
      width:100%; height:100%; overflow:hidden;
      /* Website white palette */
      background:#f4f7ff;
    }

    /* CSS3D below, WebGL (alpha) on top.
       KEY RULE: only put WebGL geometry that does NOT overlap the
       video-wall area in screen space (no solid back/side-wall planes). */
    #css3d-layer { position:absolute; inset:0; z-index:1; }
    #webgl-layer { position:absolute; inset:0; z-index:2; pointer-events:none; }

    /* Dark-glass panel — strong contrast against white room */
    .p-wrap {
      border-radius:4px;
      overflow:hidden;
      background:#060d1a;
      box-shadow:
        0 0 0 2px rgba(30,90,220,0.55),
        0 0 55px rgba(40,100,255,0.24),
        inset 0 0 0 1px rgba(255,255,255,0.07);
    }
    .p-wrap iframe { display:block; border:none; background:#060d1a; }

    /* HUD — light theme */
    #hud {
      position:absolute; top:0; left:0; right:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 28px;
      background:linear-gradient(to bottom,rgba(244,247,255,0.96) 0%,transparent 100%);
      border-bottom:1px solid rgba(30,80,200,0.12);
      pointer-events:none;
      font-family:'IBM Plex Mono',monospace;
      font-size:10px; color:#4a5870; letter-spacing:1.6px; text-transform:uppercase;
    }
    #hud .brand { font-size:13px; color:#1a44cc; font-weight:500; letter-spacing:2px; }
    #hud .status-bar { display:flex; align-items:center; gap:22px; }
    .live-dot {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      background:#00bb55; box-shadow:0 0 7px #00bb55;
      margin-right:7px; animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    #nav {
      position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
      z-index:10; display:flex; gap:10px;
    }
    .nav-btn {
      font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:2px;
      text-transform:uppercase; text-decoration:none; color:#3a4e6a;
      padding:8px 18px; border:1px solid rgba(30,80,200,0.22); border-radius:2px;
      background:rgba(244,247,255,0.92); backdrop-filter:blur(8px);
      cursor:pointer; transition:all 0.2s;
    }
    .nav-btn:hover { color:#1a44cc; border-color:rgba(30,80,200,0.5); }
  </style>
</head>
<body>

<div id="css3d-layer"></div>
<div id="webgl-layer"></div>

<div id="hud">
  <div class="brand">◆ Vertifex Technology</div>
  <div class="status-bar">
    <span><span class="live-dot"></span>All Systems Nominal</span>
    <span id="hud-time">00:00:00</span>
    <span>Operations Control Centre · Secure Facility</span>
  </div>
  <div>EST. 2024 · KL, MALAYSIA</div>
</div>

<div id="nav">
  <a href="/" class="nav-btn">← Company Profile</a>
  <span class="nav-btn" id="btn-reset" style="cursor:pointer;">⊙ Reset View</span>
</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { CSS3DRenderer, CSS3DObject } from 'https://esm.sh/three@0.160.0/examples/jsm/renderers/CSS3DRenderer.js';

// ════════════════════════════════════════════════════════════
//  SCENE & CAMERA
//  High bird's-eye view: camera elevated, looking down + forward
// ════════════════════════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const scene    = new THREE.Scene();
const cssScene = new THREE.Scene();

// Very faint white fog (depth without obscuring panels)
scene.fog = new THREE.FogExp2(0xf0f4ff, 0.000018);

// Camera: elevated overview — pulled back to z=2200 so all 3 side columns
// (C3 outer edge at x=2794) fit within the horizontal FOV with margin.
const camera = new THREE.PerspectiveCamera(62, W / H, 5, 28000);
const CAM_BASE = new THREE.Vector3(0, 700, 800);    // even closer — side panels at viewport edges, centre dominates
camera.position.copy(CAM_BASE);
camera.lookAt(0, 0, -800);

// ── WebGL renderer (transparent — CSS3D shows through) ────────
const gl = new THREE.WebGLRenderer({ antialias:true, alpha:true });
gl.setPixelRatio(Math.min(devicePixelRatio, 2));
gl.setSize(W, H);
gl.setClearColor(0x000000, 0);
gl.shadowMap.enabled = true;
gl.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('webgl-layer').appendChild(gl.domElement);

// ── CSS3D renderer ────────────────────────────────────────────
const css = new CSS3DRenderer();
css.setSize(W, H);
Object.assign(css.domElement.style, { position:'absolute', top:'0', left:'0' });
document.getElementById('css3d-layer').appendChild(css.domElement);

// ════════════════════════════════════════════════════════════
//  LIGHTING — bright white room
// ════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 14));

const keyLight = new THREE.DirectionalLight(0xffffff, 5.5);
keyLight.position.set(0, 1600, 800);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);

// Screen-glow: blue light emanating from the video wall
const screenGlow = new THREE.PointLight(0x3366ff, 24, 5500, 1.2);
screenGlow.position.set(0, 0, -1100);
scene.add(screenGlow);

// Gentle side fills
[-2400, 2400].forEach(x => {
  const fillLight = new THREE.PointLight(0xddeeff, 6, 9000, 0.4);
  fillLight.position.set(x, 400, -200);
  scene.add(fillLight);
});

// Floor bounce (screen light reflecting off white floor)
const floorBounce = new THREE.PointLight(0x8aaeff, 10, 4200, 1.7);
floorBounce.position.set(0, -700, 200);
scene.add(floorBounce);

// Overhead spots above walking area
[-700, 0, 700].forEach(x => {
  const sp = new THREE.PointLight(0xffffff, 4, 3200, 1.5);
  sp.position.set(x, 200, 700);
  scene.add(sp);
});

// ════════════════════════════════════════════════════════════
//  FLOOR — white polished concrete with grid
//  IMPORTANT: no solid wall planes — they would overlay CSS3D panels.
//  The page background (#f4f7ff) acts as the white room "walls".
// ════════════════════════════════════════════════════════════
const FLOOR_Y = -1100;   // well below panels so floor doesn't occlude CSS3D rows

// NOTE: no solid floor PlaneGeometry — it would render at z-index:2 (WebGL) and
// cover the CSS3D panel rows below, since the floor projects onto the same screen area.
// The CSS body background (#f4f7ff) provides the white "floor" appearance.

// Very faint grid — sparse and semi-transparent to minimise occlusion of CSS3D panels below
const grid = new THREE.GridHelper(10000, 30, 0xc8d8ee, 0xe0eaf8);
grid.position.y = FLOOR_Y + 1;
grid.material.transparent = true;
grid.material.opacity = 0.22;
scene.add(grid);

// Blue screen-light pool — keep very subtle (opacity 0.07) to not occlude panels much
const screenPool = new THREE.Mesh(
  new THREE.CircleGeometry(1200, 48),
  new THREE.MeshBasicMaterial({ color:0xaabcff, transparent:true, opacity:0.07 })
);
screenPool.rotation.x = -Math.PI / 2;
screenPool.position.set(0, FLOOR_Y + 2, -200);
scene.add(screenPool);

// (Ceiling arcs removed per user request)

// (Equipment racks removed — they appeared as unwanted "pillars" from this camera angle)

// ════════════════════════════════════════════════════════════
//  VIDEO WALL — CURVED arc, all 15 panels unique, no duplicates
//
//  CURVE_R=4000: panels wrap on a cylindrical arc so outer columns
//  rotate to face the camera. Centre panels face straight ahead.
//
//  Layout (15 unique panels):
//   Row 1 (top, 3 cols/side):  weather  sys-health  units | notif  alerts  panel-ss
//   Row 2 (mid, 2 cols/side):       transit  network | comms  events
//   Row 3 (bot, 2 cols/side):    timeline  aq-1 | aq-2  crowd
//   Centre (big):  traffic-overview
// ════════════════════════════════════════════════════════════
const WALL_Z   = -800;
const CURVE_R  = 4000;   // arc radius — panels curve back and face camera
const P_SCALE  = 1.5;    // side panels (smaller): 340×1.5=510 wide, 300×1.5=450 tall

// ── Centre — TWO LARGE framed panels stacked to span the FULL wall height ──
// Each PNG is its own CSS3DObject with .p-wrap blue-glow frame.
// CTR_SCALE=2.0 → each PNG: 700×340 CSS → 1400×680 scene (half-w=700, half-h=340).
// Top centre at y=+360, bottom centre at y=-360 → ~40-unit gap between PNGs.
// Total centre extent ±700 — matches the height of the 3-row side stack (2×450+20=920 incl. gaps; ±~460).
const CTR_SCALE = 2.0;
[
  { src: '/citywide-surveillance.png',     y: +360 },
  { src: '/license-plate-recognition.png', y: -360 },
].forEach(({ src, y }) => {
  const wrap = document.createElement('div');
  wrap.className = 'p-wrap';
  wrap.style.cssText = 'width:700px;height:340px;overflow:hidden;background:#060d1a;';
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'display:block;width:700px;height:340px;object-fit:cover;object-position:center;background:#060d1a;';
  img.draggable = false;
  wrap.appendChild(img);
  const obj = new CSS3DObject(wrap);
  obj.position.set(0, y, WALL_Z);
  obj.scale.setScalar(CTR_SCALE);
  cssScene.add(obj);
});

// ── Curved panel factory ──────────────────────────────────────
// Each panel sits on a cylindrical arc of radius CURVE_R centred on x=0.
// At column x: arc angle θ = arcsin(x/CURVE_R), z shifts back by R(1−cosθ),
// panel rotates −θ around Y so it always faces inward toward the camera.
function mkPanel(id, x, y) {
  const wrap = document.createElement('div');
  wrap.className     = 'p-wrap';
  wrap.style.cssText = 'width:340px;height:300px;';
  const ifr          = document.createElement('iframe');
  ifr.src            = '/command_center.html?p=' + id;
  ifr.style.cssText  = 'display:block;border:none;width:340px;height:300px;';
  ifr.setAttribute('scrolling', 'no');
  wrap.appendChild(ifr);
  const theta = Math.asin(Math.min(Math.abs(x) / CURVE_R, 1)) * Math.sign(x);
  const zCurve = WALL_Z + CURVE_R * (1 - Math.cos(theta));
  const obj = new CSS3DObject(wrap);
  obj.position.set(x, y, zCurve);
  obj.rotation.y = -theta;   // face toward centre / camera
  obj.scale.setScalar(P_SCALE);
  cssScene.add(obj);
}

// Column x-centres (centre half=700, panel half=255, gap=20):
// C1 = 700+20+255 = 975 ≈ 980;  C2 = 980+255+20+255 = 1510
const C1 = 980, C2 = 1510;

// Row y-centres — tight 3-row stack on each side (panel half-h=225, gap=20):
// rows centered around y=0 with 20-unit gaps between adjacent rows
// R1 = 225+20+225 = 470;  R2 = 0;  R3 = -470
const R1 = 470, R2 = 0, R3 = -470;

// ── VIDEO-WALL LAYOUT — tight 2×3 cluster on each side of the centre ──
//
//   col:    −C2  −C1   [ CENTRE PNGs ]   +C1  +C2
//   R1  top: [P]  [P]                    [P]  [P]
//   R2  mid: [P]  [P]      [ CTR ]       [P]  [P]
//   R3  bot: [P]  [P]                    [P]  [P]
//
// 6 LEFT panels (3 rows × 2 cols) stacked tight with 20-unit gaps in every
// direction; 6 RIGHT panels mirror them. Centre PNGs span the full vertical
// extent so there's no empty space above/below them.

// LEFT cluster (6 panels)
mkPanel('weather',          -C2, R1);
mkPanel('system-health',    -C1, R1);
mkPanel('transit',          -C2, R2);
mkPanel('panel-network',    -C1, R2);
mkPanel('panel-timeline',   -C2, R3);
mkPanel('air-quality-1',    -C1, R3);

// RIGHT cluster (6 panels)
mkPanel('notifications',    +C1, R1);
mkPanel('building-alerts',  +C2, R1);
mkPanel('panel-comms',      +C1, R2);
mkPanel('panel-events',     +C2, R2);
mkPanel('panel-units',      +C1, R3);
mkPanel('panel-ss',         +C2, R3);

// (traffic-overview, panel-crowd, air-quality-2 unused — removed per user request)

// (Walking people removed per user request)

// ════════════════════════════════════════════════════════════
//  HUD CLOCK
// ════════════════════════════════════════════════════════════
const hudTime = document.getElementById('hud-time');
setInterval(() => {
  const n = new Date();
  hudTime.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()]
    .map(v => String(v).padStart(2, '0')).join(':');
}, 1000);

// ════════════════════════════════════════════════════════════
//  MOUSE PARALLAX
// ════════════════════════════════════════════════════════════
let mx = 0, my = 0, cx = 0, cy = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX / window.innerWidth  - 0.5;
  my = e.clientY / window.innerHeight - 0.5;
});
document.getElementById('btn-reset').addEventListener('click', () => {
  mx = my = cx = cy = 0;
});

// ════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════════
const t0 = performance.now();
(function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - t0) / 1000;

  cx += (mx - cx) * 0.042;
  cy += (my - cy) * 0.042;
  camera.position.x = CAM_BASE.x + cx * 100;
  camera.position.y = CAM_BASE.y - cy * 40;
  camera.lookAt(-cx * 30, cy * 25, -800);

  screenGlow.intensity = 22 + Math.sin(t * 0.33) * 4.5;
  keyLight.intensity   = 5.2 + Math.sin(t * 0.19) * 0.7;
  floorBounce.intensity = 9 + Math.sin(t * 0.47) * 2.5;

  gl.render(scene, camera);
  css.render(cssScene, camera);
})();

// ════════════════════════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  gl.setSize(window.innerWidth, window.innerHeight);
  css.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
