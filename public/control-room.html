<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertifex — Operations Control Centre</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body {
      width:100%; height:100%; overflow:hidden;
      /* Website white palette */
      background:#f4f7ff;
    }

    /* CSS3D below, WebGL (alpha) on top.
       KEY RULE: only put WebGL geometry that does NOT overlap the
       video-wall area in screen space (no solid back/side-wall planes). */
    #css3d-layer { position:absolute; inset:0; z-index:1; }
    #webgl-layer { position:absolute; inset:0; z-index:2; pointer-events:none; }

    /* Dark-glass panel — strong contrast against white room */
    .p-wrap {
      border-radius:4px;
      overflow:hidden;
      background:#060d1a;
      box-shadow:
        0 0 0 2px rgba(30,90,220,0.55),
        0 0 55px rgba(40,100,255,0.24),
        inset 0 0 0 1px rgba(255,255,255,0.07);
    }
    .p-wrap iframe { display:block; border:none; background:#060d1a; }

    /* HUD — light theme */
    #hud {
      position:absolute; top:0; left:0; right:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 28px;
      background:linear-gradient(to bottom,rgba(244,247,255,0.96) 0%,transparent 100%);
      border-bottom:1px solid rgba(30,80,200,0.12);
      pointer-events:none;
      font-family:'IBM Plex Mono',monospace;
      font-size:10px; color:#4a5870; letter-spacing:1.6px; text-transform:uppercase;
    }
    #hud .brand { font-size:13px; color:#1a44cc; font-weight:500; letter-spacing:2px; }
    #hud .status-bar { display:flex; align-items:center; gap:22px; }
    .live-dot {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      background:#00bb55; box-shadow:0 0 7px #00bb55;
      margin-right:7px; animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    #nav {
      position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
      z-index:10; display:flex; gap:10px;
    }
    .nav-btn {
      font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:2px;
      text-transform:uppercase; text-decoration:none; color:#3a4e6a;
      padding:8px 18px; border:1px solid rgba(30,80,200,0.22); border-radius:2px;
      background:rgba(244,247,255,0.92); backdrop-filter:blur(8px);
      cursor:pointer; transition:all 0.2s;
    }
    .nav-btn:hover { color:#1a44cc; border-color:rgba(30,80,200,0.5); }
  </style>
</head>
<body>

<div id="css3d-layer"></div>
<div id="webgl-layer"></div>

<div id="hud">
  <div class="brand">◆ Vertifex Technology</div>
  <div class="status-bar">
    <span><span class="live-dot"></span>All Systems Nominal</span>
    <span id="hud-time">00:00:00</span>
    <span>Operations Control Centre · Secure Facility</span>
  </div>
  <div>EST. 2024 · KL, MALAYSIA</div>
</div>

<div id="nav">
  <a href="/" class="nav-btn">← Company Profile</a>
  <span class="nav-btn" id="btn-reset" style="cursor:pointer;">⊙ Reset View</span>
</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { CSS3DRenderer, CSS3DObject } from 'https://esm.sh/three@0.160.0/examples/jsm/renderers/CSS3DRenderer.js';

// ════════════════════════════════════════════════════════════
//  SCENE & CAMERA
//  High bird's-eye view: camera elevated, looking down + forward
// ════════════════════════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const scene    = new THREE.Scene();
const cssScene = new THREE.Scene();

// Very faint white fog (depth without obscuring panels)
scene.fog = new THREE.FogExp2(0xf0f4ff, 0.000018);

// Camera: elevated view — high enough for "control room overview" feel
// but level enough to see all 3 panel rows clearly.
const camera = new THREE.PerspectiveCamera(62, W / H, 5, 28000);
const CAM_BASE = new THREE.Vector3(0, 700, 1700);
camera.position.copy(CAM_BASE);
camera.lookAt(0, 0, -800);

// ── WebGL renderer (transparent — CSS3D shows through) ────────
const gl = new THREE.WebGLRenderer({ antialias:true, alpha:true });
gl.setPixelRatio(Math.min(devicePixelRatio, 2));
gl.setSize(W, H);
gl.setClearColor(0x000000, 0);
gl.shadowMap.enabled = true;
gl.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('webgl-layer').appendChild(gl.domElement);

// ── CSS3D renderer ────────────────────────────────────────────
const css = new CSS3DRenderer();
css.setSize(W, H);
Object.assign(css.domElement.style, { position:'absolute', top:'0', left:'0' });
document.getElementById('css3d-layer').appendChild(css.domElement);

// ════════════════════════════════════════════════════════════
//  LIGHTING — bright white room
// ════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 14));

const keyLight = new THREE.DirectionalLight(0xffffff, 5.5);
keyLight.position.set(0, 1600, 800);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);

// Screen-glow: blue light emanating from the video wall
const screenGlow = new THREE.PointLight(0x3366ff, 24, 5500, 1.2);
screenGlow.position.set(0, 0, -1100);
scene.add(screenGlow);

// Gentle side fills
[-2400, 2400].forEach(x => {
  const fillLight = new THREE.PointLight(0xddeeff, 6, 9000, 0.4);
  fillLight.position.set(x, 400, -200);
  scene.add(fillLight);
});

// Floor bounce (screen light reflecting off white floor)
const floorBounce = new THREE.PointLight(0x8aaeff, 10, 4200, 1.7);
floorBounce.position.set(0, -700, 200);
scene.add(floorBounce);

// Overhead spots above walking area
[-700, 0, 700].forEach(x => {
  const sp = new THREE.PointLight(0xffffff, 4, 3200, 1.5);
  sp.position.set(x, 200, 700);
  scene.add(sp);
});

// ════════════════════════════════════════════════════════════
//  FLOOR — white polished concrete with grid
//  IMPORTANT: no solid wall planes — they would overlay CSS3D panels.
//  The page background (#f4f7ff) acts as the white room "walls".
// ════════════════════════════════════════════════════════════
const FLOOR_Y = -1100;   // well below panels so floor doesn't occlude CSS3D rows

// NOTE: no solid floor PlaneGeometry — it would render at z-index:2 (WebGL) and
// cover the CSS3D panel rows below, since the floor projects onto the same screen area.
// The CSS body background (#f4f7ff) provides the white "floor" appearance.

// Very faint grid — sparse and semi-transparent to minimise occlusion of CSS3D panels below
const grid = new THREE.GridHelper(10000, 30, 0xc8d8ee, 0xe0eaf8);
grid.position.y = FLOOR_Y + 1;
grid.material.transparent = true;
grid.material.opacity = 0.22;
scene.add(grid);

// Blue screen-light pool — keep very subtle (opacity 0.07) to not occlude panels much
const screenPool = new THREE.Mesh(
  new THREE.CircleGeometry(1200, 48),
  new THREE.MeshBasicMaterial({ color:0xaabcff, transparent:true, opacity:0.07 })
);
screenPool.rotation.x = -Math.PI / 2;
screenPool.position.set(0, FLOOR_Y + 2, -200);
scene.add(screenPool);

// ════════════════════════════════════════════════════════════
//  CEILING — only the curved arc + inner ring (thin tubes, no solid plane)
//  Thin geometry won't cover panel area in screen space.
// ════════════════════════════════════════════════════════════
const CEIL_Y = 1100;

function makeCeilingArc(r, thickness, color, opacity, n = 88) {
  const pts = [];
  for (let i = -72; i <= 72; i += 2) {
    const rad = i * Math.PI / 180;
    pts.push(new THREE.Vector3(r * Math.sin(rad), 0, -r * Math.cos(rad) + 150));
  }
  const mat = opacity < 1
    ? new THREE.MeshBasicMaterial({ color, transparent:true, opacity })
    : new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), n, thickness, 8, false),
    mat
  );
  mesh.position.y = CEIL_Y;
  scene.add(mesh);
}
makeCeilingArc(1400, 10, 0x2255ee, 1);     // primary brand-blue arc
makeCeilingArc(1000,  5, 0x4477cc, 0.60);  // inner softer ring

// Ceiling downlights (small circles — no depth occlusion issue)
[-750, 0, 750].forEach(x => {
  [-500, 200, 900, 1550].forEach(z => {
    const dl = new THREE.Mesh(
      new THREE.CircleGeometry(24, 16),
      new THREE.MeshBasicMaterial({ color:0xffffff })
    );
    dl.rotation.x = Math.PI / 2;
    dl.position.set(x, CEIL_Y - 1, z);
    scene.add(dl);
  });
});

// ════════════════════════════════════════════════════════════
//  EQUIPMENT RACKS — white chassis, coloured LEDs
//  Placed on far sides (x > ±1900) — outside the panel x-range
//  so they never overlap CSS3D panels in screen space.
// ════════════════════════════════════════════════════════════
function mkRack(x, z, rotY) {
  const g    = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(210, 740, 115),
    new THREE.MeshStandardMaterial({ color:0xe4eaf6, roughness:0.40, metalness:0.10 })
  );
  g.add(body);

  for (let i = 0; i < 17; i++) {
    const div = new THREE.Mesh(
      new THREE.BoxGeometry(200, 2, 105),
      new THREE.MeshBasicMaterial({ color:0xc8d4ea })
    );
    div.position.set(0, -355 + i * 44, 0);
    g.add(div);
  }

  const lc = [0x0055ff, 0x00cc44, 0x00cc44, 0x0055ff, 0x00cc44, 0xff8800];
  for (let i = 0; i < 12; i++) {
    const led = new THREE.Mesh(
      new THREE.BoxGeometry(8, 5, 3),
      new THREE.MeshBasicMaterial({ color: lc[Math.floor(Math.random() * lc.length)] })
    );
    led.position.set(-76 + Math.random() * 152, -310 + i * 54 + Math.random() * 18, 59);
    g.add(led);
  }

  [-90, 90].forEach(rx => {
    const rail = new THREE.Mesh(
      new THREE.BoxGeometry(6, 720, 9),
      new THREE.MeshStandardMaterial({ color:0xccd8f0, roughness:0.4 })
    );
    rail.position.set(rx, 0, 50);
    g.add(rail);
  });

  g.position.set(x, FLOOR_Y + 370, z);
  g.rotation.y = rotY;
  scene.add(g);
}

[-2050, -2210, -2050].forEach((x, i) => mkRack(x, -500 + i * 500, 0.28));
[ 2050,  2210,  2050].forEach((x, i) => mkRack(x, -500 + i * 500, -0.28));

// Vertical LED accent strips beside racks (anchored to new FLOOR_Y)
[-2000, 2000].forEach(x => {
  [0, 26, 52].forEach(dx => {
    const s = new THREE.Mesh(
      new THREE.BoxGeometry(8, 720, 5),
      new THREE.MeshBasicMaterial({ color:0x2255dd, transparent:true, opacity:0.75 })
    );
    s.position.set(x + dx * Math.sign(x), FLOOR_Y + 360, -350);
    scene.add(s);
  });
});

// Floor guide lines (very thin, semi-transparent — minimal occlusion)
[-850, 0, 850].forEach(x => {
  const ln = new THREE.Mesh(
    new THREE.BoxGeometry(3, 2, 3600),
    new THREE.MeshBasicMaterial({ color:0x7898cc, transparent:true, opacity:0.30 })
  );
  ln.position.set(x, FLOOR_Y + 2, -100);
  scene.add(ln);
});

// ════════════════════════════════════════════════════════════
//  VIDEO WALL — flat alignment at WALL_Z
//
//  All panels face camera (no Y-rotation) so content is never
//  clipped or foreshortened. Panel scale = 2.2 so they read
//  clearly at the chosen camera distance.
//
//  Layout (3 cols × 3 rows each side + big centre):
//
//  col x:  −2420  −1650  −880   [BIG 960 WIDE]  +880  +1650  +2420
//  row y=790: ████   ████   ████               ████  ████   ████
//  row y=200: ████   ████   ████  [  cmd  ]    ████  ████   ████
//  row y=−390:████   ████   ████               ████  ████   ████
// ════════════════════════════════════════════════════════════
const WALL_Z      = -800;   // video wall z-position
const P_SCALE     = 2.2;    // scene units per CSS pixel  (340×2.2=748 wide)
const CTR_SCALE   = 0.50;   // big centre: 1920×0.50=960 wide, 920×0.50=460 tall

// ── Big centre display ────────────────────────────────────────
const cwrap = document.createElement('div');
cwrap.className     = 'p-wrap';
cwrap.style.cssText = 'width:1920px;height:920px;';
const cifr          = document.createElement('iframe');
cifr.src            = '/command_center.html';
cifr.style.cssText  = 'display:block;border:none;width:1920px;height:920px;';
cifr.setAttribute('scrolling', 'no');
cwrap.appendChild(cifr);
const centerObj = new CSS3DObject(cwrap);
centerObj.position.set(0, 0, WALL_Z);   // centre panel at camera lookAt y
centerObj.scale.setScalar(CTR_SCALE);
cssScene.add(centerObj);

// ── Side panel factory ────────────────────────────────────────
function mkPanel(id, x, y) {
  const wrap = document.createElement('div');
  wrap.className     = 'p-wrap';
  wrap.style.cssText = 'width:340px;height:300px;';
  const ifr          = document.createElement('iframe');
  ifr.src            = '/command_center.html?p=' + id;
  ifr.style.cssText  = 'display:block;border:none;width:340px;height:300px;';
  ifr.setAttribute('scrolling', 'no');
  wrap.appendChild(ifr);
  const obj = new CSS3DObject(wrap);
  obj.position.set(x, y, WALL_Z);
  obj.scale.setScalar(P_SCALE);
  cssScene.add(obj);
}

// Column centres (same — verified they fit within hFOV=98.6° at distance 2500):
// centre half=480, panel half=374, gap=20 → C1=874≈880; C2=880+748+20=1648≈1650; C3≈2420
const C1 = 880, C2 = 1650, C3 = 2420;

// Row centres — corrected to avoid overlap between adjacent rows.
// Panel half-height = 330. Row spacing = 330+20+330 = 680 (guaranteed 20-unit gap).
// Centre panel half-height = 230; centre is at y=0 (= lookAt y).
// R1 = 0 + 330 + 20 + 330 = 680;  R3 = −680.
// (Centre top=230 < R1 bottom=680-330=350 ✓, Centre bottom=−230 > R3 top=−680+330=−350 ✓)
const R1 = 680, R2 = 0, R3 = -680;

// ── ROW 1 — top ───────────────────────────────────────────────
mkPanel('traffic-overview', -C3, R1);
mkPanel('weather',          -C2, R1);
mkPanel('system-health',    -C1, R1);
mkPanel('panel-units',      +C1, R1);
mkPanel('notifications',    +C2, R1);
mkPanel('building-alerts',  +C3, R1);

// ── ROW 2 — mid (flanking big centre) ─────────────────────────
mkPanel('panel-ss',         -C3, R2);
mkPanel('transit',          -C2, R2);
mkPanel('panel-network',    -C1, R2);
mkPanel('panel-comms',      +C1, R2);
mkPanel('panel-events',     +C2, R2);
mkPanel('panel-crowd',      +C3, R2);

// ── ROW 3 — bottom ────────────────────────────────────────────
mkPanel('panel-timeline',   -C3, R3);
mkPanel('air-quality-1',    -C2, R3);
mkPanel('air-quality-2',    -C1, R3);
mkPanel('panel-crowd',      +C1, R3);   // independent iframe instance
mkPanel('panel-events',     +C2, R3);
mkPanel('building-alerts',  +C3, R3);

// ════════════════════════════════════════════════════════════
//  WALKING PEOPLE — cone body + sphere head, white tones
// ════════════════════════════════════════════════════════════
class Person {
  constructor({ startAngle, cx, cz, rx, rz, speed }) {
    const g = new THREE.Group();

    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0xe8edf8, roughness: 0.68, metalness: 0.0
    });
    const headMat = new THREE.MeshStandardMaterial({
      color: 0xf4e8d8, roughness: 0.65
    });

    // Cone body (wide at base, narrow top)
    const body = new THREE.Mesh(new THREE.ConeGeometry(36, 118, 8), bodyMat);
    body.position.y = 59;
    g.add(body);

    // Sphere head — gap above cone tip reads as neck
    const head = new THREE.Mesh(new THREE.SphereGeometry(28, 12, 10), headMat);
    head.position.y = 144;
    g.add(head);

    // Cylinder legs
    this.legL = new THREE.Mesh(new THREE.CylinderGeometry(11, 8, 82, 6), bodyMat);
    this.legL.position.set(-17, -41, 0);
    g.add(this.legL);

    this.legR = new THREE.Mesh(new THREE.CylinderGeometry(11, 8, 82, 6), bodyMat);
    this.legR.position.set( 17, -41, 0);
    g.add(this.legR);

    // Place so feet (local y = −82) touch the floor
    g.position.y = FLOOR_Y + 82;

    this.g     = g;
    this.angle = startAngle;
    this.cx = cx; this.cz = cz;
    this.rx = rx; this.rz = rz;
    this.speed = speed;
    scene.add(g);
  }

  update(t) {
    this.angle += this.speed;
    this.g.position.x = this.cx + Math.cos(this.angle) * this.rx;
    this.g.position.z = this.cz + Math.sin(this.angle) * this.rz;
    this.g.position.y = FLOOR_Y + 82 + Math.abs(Math.sin(t * 5.0)) * 11;

    // Face direction of travel
    const s = Math.sign(this.speed);
    this.g.rotation.y = Math.atan2(
      -Math.sin(this.angle) * this.rx * s,
       Math.cos(this.angle) * this.rz * s
    );

    const sw = Math.sin(t * 5.6) * 0.44;
    this.legL.rotation.x =  sw;
    this.legR.rotation.x = -sw;
  }
}

const people = [
  new Person({ startAngle:0,               cx: -60, cz: 800, rx:520, rz:85,  speed:-0.0052 }),
  new Person({ startAngle:Math.PI * 0.66,  cx:  70, cz: 850, rx:460, rz:78,  speed: 0.0074 }),
  new Person({ startAngle:Math.PI * 1.33,  cx: -20, cz: 750, rx:490, rz:95,  speed:-0.0060 }),
];

// ════════════════════════════════════════════════════════════
//  HUD CLOCK
// ════════════════════════════════════════════════════════════
const hudTime = document.getElementById('hud-time');
setInterval(() => {
  const n = new Date();
  hudTime.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()]
    .map(v => String(v).padStart(2, '0')).join(':');
}, 1000);

// ════════════════════════════════════════════════════════════
//  MOUSE PARALLAX
// ════════════════════════════════════════════════════════════
let mx = 0, my = 0, cx = 0, cy = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX / window.innerWidth  - 0.5;
  my = e.clientY / window.innerHeight - 0.5;
});
document.getElementById('btn-reset').addEventListener('click', () => {
  mx = my = cx = cy = 0;
});

// ════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ════════════════════════════════════════════════════════════
const t0 = performance.now();
(function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - t0) / 1000;

  cx += (mx - cx) * 0.042;
  cy += (my - cy) * 0.042;
  camera.position.x = CAM_BASE.x + cx * 120;
  camera.position.y = CAM_BASE.y - cy * 45;
  camera.lookAt(-cx * 40, 0 + cy * 30, -800);

  screenGlow.intensity = 22 + Math.sin(t * 0.33) * 4.5;
  keyLight.intensity   = 5.2 + Math.sin(t * 0.19) * 0.7;
  floorBounce.intensity = 9 + Math.sin(t * 0.47) * 2.5;

  people.forEach(p => p.update(t));

  gl.render(scene, camera);
  css.render(cssScene, camera);
})();

// ════════════════════════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  gl.setSize(window.innerWidth, window.innerHeight);
  css.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
